
  # Which exchange to fetch data from. Options: "binance", "bybit", or a list like ["binance", "bybit"]
exchange: "bybit"
  # Cryptocurrency symbol to track/fetch (e.g. BTC, ETH, SOL).
  # The quote currency (like USDT) will be appended dynamically in Python.
  # You can pass a single symbol as a string:
  #   symbols: "BTC"
  # Or you can pass a list of multiple symbols:
  #   symbols:
  #     - "BTC"
  #     - "ETH"
  #     - "SOL"
  #     - "LTC"
  #     - "DOGE"
  #     - "MINA"
  #     - "SUI"
  #     - "ADA"
symbols:
 
    - "SOL"
    - "ADA"
  # Candle interval. Options: "1m", "3m", "5m", "15m", "30m", "1h", "1d"
timeframe: "1m"
  # Start time in UTC. Format: "YYYY-MM-DD HH:MM:SS"
start_time: "2026-06-22 00:00:00"
  # End time in UTC. Options: "now" (real-time/latest) or "YYYY-MM-DD HH:MM:SS"
end_time: "now"
# DATA CLEANING AND HANDLING MISSING DATA  
  # How to handle missing data gaps:
  #   - "ffill"       : Forward Fill (fill missing values with the last known candle's close price)
  #   - "interpolate" : Estimate intermediate values linearly (smooth bridge between gaps)
fill_method: "ffill"
max_retries: 5          # Number of times to retry fetching if API fails
retry_delay: 3          # Time to wait (in seconds) between retries
